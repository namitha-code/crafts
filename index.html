<!DOCTYPE html>
<html>
<head>
    <title>DIY Arts & Crafts Studio</title>
</head>

<body bgcolor="#F5F1E8">

<h2>Workshop Registration</h2>

<form id="myForm">
    <input type="text" name="fullname" placeholder="Full Name" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>

    <select name="age">
        <option>Under 15</option>
        <option>15 - 20</option>
        <option>21 - 35</option>
        <option>36+</option>
    </select><br><br>

    <input type="radio" name="session" value="Morning">Morning
    <input type="radio" name="session" value="Afternoon">Afternoon
    <input type="radio" name="session" value="Evening">Evening
    <br><br>

    <textarea name="comments" placeholder="Comments"></textarea><br><br>

    <button type="submit">Submit</button>
</form>

<hr>

<h2>Submitted Data</h2>
<button onclick="loadData()">Refresh</button>

<table border="1" width="100%" id="dataTable">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Session</th>
        <th>Comments</th>
        <th>Action</th>
    </tr>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjRZwQ1uw3dqDEXFoSBNdREz5L12rUsrxM9K8qoLhCvCuN_xvrqFAnUVTLs-LAxoTpWw/exec";

document.getElementById("myForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const data = Object.fromEntries(formData.entries());

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Submitted!");
    loadData();
});

async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const table = document.getElementById("dataTable");

    table.innerHTML = `
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Session</th>
            <th>Comments</th>
            <th>Action</th>
        </tr>
    `;

    data.forEach(row => {
        table.innerHTML += `
            <tr>
                <td>${row.fullname}</td>
                <td>${row.email}</td>
                <td>${row.age}</td>
                <td>${row.session}</td>
                <td>${row.comments}</td>
                <td>
                    <button onclick="deleteRow('${row.id}')">Delete</button>
                </td>
            </tr>
        `;
    });
}

async function deleteRow(id) {
    await fetch(API_URL + "?id=" + id);
    alert("Deleted!");
    loadData();
}

loadData();
</script>

</body>
</html>
